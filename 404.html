<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Bilal Today</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        color: #fff;
        overflow-x: hidden;
    }
    /* Container */
    .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        perspective: 1000px;
    }

    /* 3D 404 */
    .error-404 {
        font-size: 10rem;
        font-weight: 900;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.5s ease;
    }
    .error-404:hover {
        transform: rotateY(20deg) rotateX(10deg);
    }
    .error-404::before,
    .error-404::after {
        content: "404";
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        color: rgba(255,255,255,0.1);
        transform: translateZ(-50px) rotateY(20deg);
    }

    /* Neon Text */
    .brand {
        font-size: 2rem;
        font-weight: bold;
        color: #19c37d;
        text-shadow: 0 0 8px #19c37d, 0 0 16px #19c37d;
        margin-bottom: 2rem;
    }

    /* Button */
    .btn-home {
        padding: 1rem 2rem;
        border: 2px solid #19c37d;
        border-radius: 12px;
        font-weight: 600;
        color: #19c37d;
        background: transparent;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 2rem;
    }
    .btn-home:hover {
        background: #19c37d;
        color: #0f2027;
        transform: scale(1.1);
        box-shadow: 0 0 20px #19c37d, 0 0 40px #19c37d;
    }

    /* Animierte Partikel */
    .particle {
        position: absolute;
        width: 6px; height: 6px;
        background: #19c37d;
        border-radius: 50%;
        animation: float 6s infinite;
        opacity: 0.7;
    }
    @keyframes float {
        0% { transform: translateY(0) translateX(0); opacity: 0.7; }
        50% { transform: translateY(-50px) translateX(30px); opacity: 1; }
        100% { transform: translateY(0) translateX(0); opacity: 0.7; }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="brand">BilalToday.com</div>
        <div class="error-404">404</div>
        <p class="text-xl mt-4 text-gray-300">Ups! Diese Seite gibt es nicht.</p>
        <button class="btn-home" onclick="window.location.href='/'">Zur Startseite</button>
    </div>

    <!-- Partikel -->
    <script>
        for(let i=0;i<30;i++){
            let p=document.createElement('div');
            p.className='particle';
            p.style.left=Math.random()*window.innerWidth+'px';
            p.style.top=Math.random()*window.innerHeight+'px';
            p.style.width=(2+Math.random()*6)+'px';
            p.style.height=(2+Math.random()*6)+'px';
            p.style.animationDuration=(4+Math.random()*4)+'s';
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
