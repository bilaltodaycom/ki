<!DOCTYPE html>

    <style>
        /* Custom Scrollbar im ChatGPT-Style */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Basis-Styling & Animationen */
        body {
            background-color: #212121; /* ChatGPT Dark Mode Background */
            color: #ececf1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .chat-bubble {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Lade-Animation (3 Punkte) */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Blinker-Cursor für den Typing-Effekt */
        .cursor {
            display: inline-block;
            width: 4px;
            height: 1.2em;
            background-color: #ececf1;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>

        // ==========================================
        // 🤖 KI LOGIK (Keyword Matching)
        // ==========================================
        function getBotResponse(text) {
            const inputClean = text.toLowerCase().replace(/[^\w\säöüß]/gi, '').trim();
            const inputWords = inputClean.split(/\s+/).filter(w => w.length > 2 || w === 'ki');

            // 1. Exakte Übereinstimmung
            for (let item of qaData) {
                const qClean = item.q.toLowerCase().replace(/[^\w\säöüß]/gi, '').trim();
                if (qClean === inputClean) return item.a;
            }

            // 2. Keyword Matching
            let bestMatch = null;
            let highestScore = 0;

            for (let item of qaData) {
                const qClean = item.q.toLowerCase().replace(/[^\w\säöüß]/gi, '');
                const qWords = qClean.split(/\s+/);
                let score = 0;

                for (let w of inputWords) {
                    if (qWords.includes(w)) score++;
                }

                if (score > highestScore) {
                    highestScore = score;
                    bestMatch = item.a;
                }
            }

            if (highestScore > 0) return bestMatch;

            // 3. Fallback
            if (inputClean.includes('hallo') || inputClean.includes('hi') || inputClean.includes('hey')) {
                return "Hallo! Ich bin der Bilal Today Assistant. Wie kann ich dir helfen?";
            }

            return "Das habe ich leider nicht genau verstanden. Ich bin auf Fragen rund um 'Bilal Today' spezialisiert. Frag mich doch zum Beispiel, wer hinter Bilal Today steckt!";
        }

                isBot

                bubble.appendChild(cursor);
                
                let i = 0;
                isTyping = true;
                
                function typeChar() {
                    if (i < content.length) {
                        textSpan.textContent += content.charAt(i);
                        i++;
                        scrollToBottom();
                        // Zufällige Tipp-Geschwindigkeit für Realismus
                        setTimeout(typeChar, Math.random() * 20 + 10); 
                    } else {
                        cursor.remove();
                        isTyping = false;
                    }
                }
                typeChar();
            } else {
                textSpan.textContent = content;
                bubble.appendChild(textSpan);
            }

            inner.appendChild(avatar);
            inner.appendChild(bubble);
            wrapper.appendChild(inner);

            return wrapper;
        }

        function handleQuickQuestion(text) {
            userInput.value = text;
            sendMessage();
        }

        function sendMessage() {
            if (isTyping) return; // Nicht senden, während KI tippt
            const text = userInput.value.trim();
            if (!text) return;

            // Welcome Screen ausblenden, Chat einblenden
            welcomeScreen.classList.add('hidden');
            chatMessages.classList.remove('hidden');

            // 1. User Message hinzufügen
            chatMessages.appendChild(createMessageElement('user', text, false));
            userInput.value = '';
            userInput.style.height = '56px';
            sendBtn.disabled = true;
            scrollToBottom();

            // 2. Lade-Animation anzeigen
            loadingIndicator.classList.remove('hidden');
            scrollToBottom();

            // 3. Antwort simulieren (Verzögerung)
            setTimeout(() => {
                loadingIndicator.classList.add('hidden');
                const botReply = getBotResponse(text);
                chatMessages.appendChild(createMessageElement('bot', botReply, true));
            }, 600 + Math.random() * 600);
        }

        function startNewChat() {
            if (isTyping) return;
            chatMessages.innerHTML = '';
            chatMessages.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
            userInput.value = '';
            userInput.style.height = '56px';
            sendBtn.disabled = true;
        }
    </script>
</body>
</html>
